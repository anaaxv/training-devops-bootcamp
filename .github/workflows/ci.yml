name: CI Pipeline

on:
  push:
    branches: [setup/ana-alameda]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: ./backend
      - run: npm test
        working-directory: ./backend